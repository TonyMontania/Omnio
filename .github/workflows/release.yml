# Cross-platform release build.
#
# Trigger: push a semver tag like `v0.2.0`. Two-stage flow:
#   1. `build` runs in parallel on Windows, macOS and Ubuntu. Each job runs
#      `npm run build`, then stages only the user-facing installer(s) into
#      a per-OS artifact (no raw electron output, no auto-updater YAML, no
#      elevate.exe helper).
#   2. `release` runs once after all builds finish, downloads the artifacts,
#      and publishes them to a GitHub Release named after the tag.
#
# Also supports manual triggering from the Actions tab (workflow_dispatch) —
# useful for smoke-testing changes to this workflow without cutting a tag.
# Manual runs skip the release step (no tag → no release).
#
# Nothing here is signed — Windows SmartScreen and macOS Gatekeeper will
# warn on first launch. Documented in the READMEs.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# GITHUB_TOKEN needs contents:write to upload assets to a Release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Intentionally NOT passing GH_TOKEN here: with a token in the env,
      # electron-builder auto-publishes every intermediate file (raw exe,
      # elevate.exe, latest-*.yml) directly to the Release. We want only
      # the curated installers, so we let the build finish locally and
      # publish from a separate job below.
      - name: Build
        run: npm run build

      # Copy only the user-facing installers into a flat staging dir. The
      # `|| true` on each line lets the step succeed on OSes that don't
      # produce that particular artifact (no .dmg on Windows, etc).
      - name: Stage release files
        shell: bash
        run: |
          mkdir -p staging
          # Windows
          cp release/*/Omnio-*-portable.exe staging/ 2>/dev/null || true
          cp release/*/Omnio-*-setup.exe    staging/ 2>/dev/null || true
          # macOS
          cp release/*/Omnio-Mac-*.dmg      staging/ 2>/dev/null || true
          cp release/*/Omnio-Mac-*.zip      staging/ 2>/dev/null || true
          # Linux
          cp release/*/Omnio-Linux-*.AppImage staging/ 2>/dev/null || true
          cp release/*/Omnio-Linux-*.deb      staging/ 2>/dev/null || true
          cp release/*/Omnio-Linux-*.tar.gz   staging/ 2>/dev/null || true
          echo "--- staged files ---"
          ls -la staging/

      - name: Upload staged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omnio-${{ matrix.os }}
          path: staging/
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List collected files
        run: ls -la artifacts/

      # Feed the same layout that stamp-packaging.mjs expects locally
      # (release/<version>/) so the script finds every artifact.
      - name: Consolidate under release/<version>/
        run: |
          mkdir -p "release/${{ steps.version.outputs.version }}"
          cp artifacts/* "release/${{ steps.version.outputs.version }}/"

      - name: Stamp packaging manifests
        run: node scripts/stamp-packaging.mjs "${{ steps.version.outputs.version }}"

      - name: Verify no placeholders remain
        run: node scripts/stamp-packaging.mjs "${{ steps.version.outputs.version }}" --check

      - name: Bundle stamped manifests
        run: |
          cd packaging/dist
          tar -czf "../../artifacts/omnio-packaging-manifests-${{ steps.version.outputs.version }}.tar.gz" "${{ steps.version.outputs.version }}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
